<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calc">
  <div class="display">
    <div class="prev" id="prev">&nbsp;</div>
    <div class="current" id="current">0</div>
  </div>

  <div class="pad">
    <button class="fn" data-action="clear">AC</button>
    <button class="fn" data-action="del">DEL</button>
    <button class="fn" data-action="percent">%</button>
    <button class="op" data-op="+">+</button>

    <button class="num" data-num="7">7</button>
    <button class="num" data-num="8">8</button>
    <button class="num" data-num="9">9</button>
    <button class="op" data-op="−">-</button>

    <button class="num" data-num="4">4</button>
    <button class="num" data-num="5">5</button>
    <button class="num" data-num="6">6</button>
    <button class="op" data-op="×">×</button>

    <button class="num" data-num="1">1</button>
    <button class="num" data-num="2">2</button>
    <button class="num" data-num="3">3</button>
    <button class="op" data-op="÷">÷</button>

    <button class="num" data-num="0">0</button>
    <button class="dot" data-action="decimal">.</button>
    <button class="eq" data-action="equals">=</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
